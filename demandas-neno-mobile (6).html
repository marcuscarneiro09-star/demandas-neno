<meta name="apple-mobile-web-app-title" content="Demandas NENO"/>
<meta name="theme-color" content="#0d0f14"/>
<title>Demandas NENO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2129;
    --border: rgba(255,255,255,0.08);
    --red: #ff3b47;
    --amber: #ffaa00;
    --green: #00d26a;
    --blue: #4da6ff;
    --text: #f0f2f8;
    --dim: #5a6070;
    --nav-h: 72px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bot: env(safe-area-inset-bottom, 20px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* STATUS BAR AREA */
  .status-bar {
    height: calc(var(--safe-top) + 8px);
    background: var(--bg);
    flex-shrink: 0;
  }

  /* TOP HEADER */
  .top-header {
    flex-shrink: 0;
    padding: 0 20px 16px;
    background: var(--bg);
    position: relative;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .app-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #fff 30%, #6b7280);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-badge {
    background: var(--red);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.red::after { background: var(--red); }
  .stat-card.amber::after { background: var(--amber); }
  .stat-card.green::after { background: var(--green); }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    line-height: 1;
  }

  .stat-card.red .stat-num { color: var(--red); }
  .stat-card.amber .stat-num { color: var(--amber); }
  .stat-card.green .stat-num { color: var(--green); }

  .stat-lbl {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
  }

  /* TAB BAR */
  .tab-bar {
    display: flex;
    padding: 0 20px;
    gap: 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }

  .tab-btn {
    flex: 1;
    padding: 12px 0;
    background: transparent;
    border: none;
    color: var(--dim);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .tab-btn.active { color: var(--text); }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 16px; right: 16px;
    height: 2px;
    background: var(--red);
    border-radius: 2px 2px 0 0;
  }

  .tab-count {
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
  }

  /* CONTENT AREA */
  .content-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 0;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* DEMANDA CARD */
  .dcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    active-scale: 0.98;
  }

  .dcard-stripe {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .dcard-stripe.urgente { background: var(--red); }
  .dcard-stripe.andamento { background: var(--amber); }
  .dcard-stripe.pendente { background: var(--blue); }
  .dcard-stripe.concluido { background: var(--green); }

  .dcard-inner { padding-left: 12px; }

  .dcard-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }

  .dcard-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
  }

  .badge {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge.urgente { background: rgba(255,59,71,0.15); color: var(--red); }
  .badge.andamento { background: rgba(255,170,0,0.15); color: var(--amber); }
  .badge.pendente { background: rgba(77,166,255,0.15); color: var(--blue); }
  .badge.concluido { background: rgba(0,210,106,0.15); color: var(--green); }

  .dcard-desc {
    font-size: 12px;
    color: var(--dim);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .dcard-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }

  .dcard-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 6px;
  }

  .dcard-actions {
    display: flex;
    gap: 6px;
  }

  .action-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }

  .action-btn:active { transform: scale(0.9); }
  .action-btn.ok { border-color: rgba(0,210,106,0.3); color: var(--green); background: rgba(0,210,106,0.08); }
  .action-btn.del { border-color: rgba(255,59,71,0.3); color: var(--red); background: rgba(255,59,71,0.08); }

  /* AVISO CARD */
  .acard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .acard-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .acard-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
  }

  .priority-ring {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .priority-ring.alta { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .priority-ring.media { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .priority-ring.baixa { background: var(--green); box-shadow: 0 0 8px var(--green); }

  .acard-body {
    font-size: 12px;
    color: var(--dim);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .acard-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .acard-autor {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
  }

  .acard-data {
    font-size: 10px;
    color: var(--dim);
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: calc(var(--nav-h) + var(--safe-bot) + 16px);
    right: 20px;
    width: 56px; height: 56px;
    border-radius: 16px;
    background: var(--red);
    border: none;
    color: #fff;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,59,71,0.4);
    z-index: 50;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .fab:active { transform: scale(0.92); box-shadow: 0 4px 12px rgba(255,59,71,0.3); }

  /* BOTTOM NAV */
  .bottom-nav {
    flex-shrink: 0;
    height: calc(var(--nav-h) + var(--safe-bot));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding-top: 8px;
    padding-bottom: var(--safe-bot);
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: transparent;
    border: none;
    color: var(--dim);
    cursor: pointer;
    padding: 6px 0;
    transition: color 0.2s;
    position: relative;
  }

  .nav-btn.active { color: var(--text); }

  .nav-icon { font-size: 22px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }

  .nav-dot {
    position: absolute;
    top: 4px; right: calc(50% - 18px);
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    border: 2px solid var(--surface);
  }

  /* BOTTOM SHEET MODAL */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .sheet-overlay.open { opacity: 1; pointer-events: all; }

  .bottom-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 430px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 12px 20px calc(var(--safe-bot) + 20px);
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 90dvh;
    overflow-y: auto;
  }

  .sheet-overlay.open .bottom-sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .sheet-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--red);
  }

  .form-select option { background: var(--surface); }
  .form-textarea { resize: none; height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-save {
    width: 100%;
    padding: 16px;
    background: var(--red);
    border: none;
    color: #fff;
    border-radius: 14px;
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-save:active { opacity: 0.85; transform: scale(0.98); }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 14px; line-height: 1.5; }

  /* SECTION LABEL */
  .section-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* Scrollbar */
  .content-area::-webkit-scrollbar { display: none; }
  .bottom-sheet::-webkit-scrollbar { display: none; }

  /* ====== LOGIN SCREEN ====== */
  #login-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    max-width: 430px;
    margin: 0 auto;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
  }

  #login-screen.hidden {
    animation: loginOut 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
    pointer-events: none;
  }

  @keyframes loginOut {
    to { opacity: 0; transform: translateX(-50%) scale(1.04); }
  }

  .login-glow {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,59,71,0.15) 0%, transparent 70%);
    top: -60px; right: -60px;
    pointer-events: none;
  }

  .login-glow2 {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(77,166,255,0.08) 0%, transparent 70%);
    bottom: 100px; left: -60px;
    pointer-events: none;
  }

  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 52px;
    position: relative;
    z-index: 1;
  }

  .login-icon {
    width: 110px; height: 110px;
    border-radius: 22px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.1);
  }

  .login-icon img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .login-rb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--red);
    letter-spacing: 3px;
    margin-bottom: 6px;
  }

  .login-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #fff 20%, #6b7280 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }

  .login-sub {
    font-size: 15px;
    color: var(--dim);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .login-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  .login-field { display: flex; flex-direction: column; gap: 6px; }

  .login-label {
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
    padding-left: 2px;
  }

  .login-input-wrap { position: relative; }

  .login-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px 14px 48px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .login-input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(255,59,71,0.12);
  }

  .login-icon-field {
    position: absolute;
    left: 15px; top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    opacity: 0.45;
    pointer-events: none;
  }

  .login-btn {
    width: 100%;
    padding: 16px;
    background: var(--red);
    border: none;
    color: #fff;
    border-radius: 14px;
    font-family: 'Sora', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    letter-spacing: 0.5px;
    box-shadow: 0 8px 28px rgba(255,59,71,0.4);
    transition: opacity 0.2s, transform 0.15s;
  }

  .login-btn:active { opacity: 0.85; transform: scale(0.98); }

  .login-error {
    text-align: center;
    font-size: 13px;
    color: var(--red);
    background: rgba(255,59,71,0.1);
    border: 1px solid rgba(255,59,71,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    display: none;
  }

  .login-error.show { display: block; }

  .login-hint {
    text-align: center;
    font-size: 11px;
    color: var(--dim);
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .shake { animation: shake 0.4s ease; }

  /* Bottom padding for FAB */
  .content-bottom-pad { height: 90px; }

  /* Animate cards in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .dcard, .acard {
    animation: fadeUp 0.25s ease both;
  }
</style>
</head>

">

<!-- BOTTOM SHEET -->
<div class="sheet-overlay" id="sheet-overlay" onclick="handleOverlayClick(event)">

<!-- TOAST -->
<div id="toast" style="
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-bot) + 100px);
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:500;
  padding:12px 20px;border-radius:14px;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  z-index:300;opacity:0;transition:all 0.3s;white-space:nowrap;
  max-width:90vw;overflow:hidden;text-overflow:ellipsis;
"></div>

<!-- NOTIF PANEL -->
<div id="notif-overlay" style="
  position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);
  z-index:200;display:none;align-items:flex-end;
" onclick="if(event.target===this)closeNotifPanel()">
  <div style="
    background:var(--surface);border-radius:24px 24px 0 0;
    width:100%;max-width:430px;margin:0 auto;
    max-height:80dvh;display:flex;flex-direction:column;
    overflow:hidden;
  ">
    <div style="padding:12px 20px 0;display:flex;align-items:center;justify-content:space-between">
      <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 4px"></div>
    </div>
    <div style="padding:0 20px 16px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px">Notificações</div>
      <button onclick="markAllRead()" style="font-size:12px;color:var(--dim);background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer">Marcar lidas</button>
    </div>
    <div id="notif-list" style="overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,20px)"></div>
  </div>
</div>

<style>
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #notif-overlay.open { display:flex; }
</style>
<script>
// --- DATA ---
let demandas = [
  { id:1, titulo:'Ativação Botão Leve 2 Latas - Sodexo', desc:'Confirmar logística via CD e acionar 4 unidades regionais.', cliente:'BIG3 Sodexo', status:'urgente', resp:'Neno', prazo:'2026-05-20' },
  { id:2, titulo:'Visita Distribution Park Manaus', desc:'Mapear oportunidade e atualizar disponibilidade.', cliente:'Distribution Park', status:'andamento', resp:'Neno', prazo:'2026-05-22' },
  { id:3, titulo:'Proposta Regional Boni 15%', desc:'Enviar proposta para BIC, Samsung, Honda, Lopes e Liteon.', cliente:'Regionais', status:'pendente', resp:'Equipe', prazo:'2026-05-25' },
  { id:4, titulo:'Atualizar mapa disponibilidade NENO', desc:'Corrigir listings após validação com scout.', cliente:'Interno', status:'concluido', resp:'Neno', prazo:'2026-05-14' },
];

let avisos = [
  { id:1, titulo:'⚡ Reunião de alinhamento — Sexta 10h', body:'Presença obrigatória da equipe Scout NENO. Pauta: metas de junho e ativações regionais.', autor:'Gestão', prioridade:'alta', data:'14/05' },
  { id:2, titulo:'Prazo: Envio de relatórios até sexta 18h', body:'Todos os relatórios de visita devem ser enviados para consolidação semanal.', autor:'Neno', prioridade:'media', data:'13/05' },
  { id:3, titulo:'Meta junho: +40% sell-in', body:'Meta definida: 68cx por cliente regional. Foco na bonificação de 15%.', autor:'Gestão', prioridade:'alta', data:'12/05' },
  { id:4, titulo:'Novo material de PDV disponível', body:'Totens exclusivos Red Bull para retirada. Priorizar unidades Youmart.', autor:'Trade', prioridade:'baixa', data:'10/05' },
];

let nextDId = 5, nextAId = 5;
let arquivo = [];
let currentTab = 'demandas';

const statusLabel = { urgente:'Urgente', andamento:'Médio', pendente:'Baixo', concluido:'Concluído' };

// --- LOGIN ---
const USERS = {
  'neno': 'neno2025',
  'gestor': 'redbull123',
  'marcus.carneiro': '123456',
  'sillas.albuquerque': '123456',
};

let currentUser = '';

// --- NOTIFICATION SYSTEM (shared via localStorage) ---
function pushNotif(type, titulo, autor) {
  const notif = {
    id: Date.now(),
    type,
    titulo,
    autor,
    ts: Date.now(),
    readBy: [currentUser],
  };
  const all = JSON.parse(localStorage.getItem('neno_notifs') || '[]');
  all.unshift(notif);
  localStorage.setItem('neno_notifs', JSON.stringify(all.slice(0, 50)));
  showToast(`📣 Nova ${type === 'demanda' ? 'demanda' : 'aviso'}: ${titulo}`);
}

function getUnreadNotifs() {
  const all = JSON.parse(localStorage.getItem('neno_notifs') || '[]');
  return all.filter(n => !n.readBy.includes(currentUser));
}

function markAllRead() {
  const all = JSON.parse(localStorage.getItem('neno_notifs') || '[]');
  all.forEach(n => { if (!n.readBy.includes(currentUser)) n.readBy.push(currentUser); });
  localStorage.setItem('neno_notifs', JSON.stringify(all));
  updateNotifBadge();
  renderNotifPanel();
}

function updateNotifBadge() {
  const count = getUnreadNotifs().length;
  const badge = document.getElementById('notif-badge');
  badge.textContent = count;
  badge.style.display = count > 0 ? 'flex' : 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function renderNotifPanel() {
  const all = JSON.parse(localStorage.getItem('neno_notifs') || '[]');
  const el = document.getElementById('notif-list');
  if (!all.length) {
    el.innerHTML = `<div class="empty" style="padding:30px 0"><div class="empty-icon">🔔</div><div class="empty-text">Sem notificações</div></div>`;
    return;
  }
  el.innerHTML = all.map(n => {
    const unread = !n.readBy.includes(currentUser);
    const ago = (() => {
      const s = Math.floor((Date.now() - n.ts) / 1000);
      if (s < 60) return 'agora';
      if (s < 3600) return `${Math.floor(s/60)}min`;
      if (s < 86400) return `${Math.floor(s/3600)}h`;
      return `${Math.floor(s/86400)}d`;
    })();
    return `
      <div style="
        padding:14px 16px;border-bottom:1px solid var(--border);
        background:${unread ? 'rgba(255,59,71,0.06)' : 'transparent'};
        display:flex;gap:12px;align-items:flex-start;
      ">
        <div style="font-size:20px;flex-shrink:0">${n.type === 'demanda' ? '📋' : '📣'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:${unread?'600':'400'};color:var(--text);margin-bottom:3px;line-height:1.3">${n.titulo}</div>
          <div style="font-size:11px;color:var(--dim)">por ${n.autor} · ${ago}</div>
        </div>
        ${unread ? `<div style="width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:4px"></div>` : ''}
      </div>`;
  }).join('');
}

function openNotifPanel() {
  renderNotifPanel();
  document.getElementById('notif-overlay').classList.add('open');
  markAllRead();
}

function closeNotifPanel() {
  document.getElementById('notif-overlay').classList.remove('open');
}

// Poll for new notifs every 5s
setInterval(() => { if (currentUser) updateNotifBadge(); }, 5000);

function doLogin() {
  const user = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const form = document.querySelector('.login-form');

  if (USERS[user] && USERS[user] === pass) {
    currentUser = user;
    errEl.classList.remove('show');
    const screen = document.getElementById('login-screen');
    screen.classList.add('hidden');
    setTimeout(() => {
      screen.style.display = 'none';
      updateNotifBadge();
    }, 400);
  } else {
    errEl.classList.add('show');
    form.classList.remove('shake');
    void form.offsetWidth;
    form.classList.add('shake');
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
  }
}

// Enter key support
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-user').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-pass').focus();
});

// --- DATE ---
const now = new Date();
document.getElementById('date-badge').textContent =
  now.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' }).toUpperCase();

// --- RENDER ---
function renderDemandas() {
  const el = document.getElementById('demandas-list');
  if (!demandas.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma demanda.<br>Toque + para adicionar.</div></div>`;
  } else {
    el.innerHTML = demandas.map((d, i) => `
      <div class="dcard" style="animation-delay:${i*0.04}s">
        <div class="dcard-stripe ${d.status}"></div>
        <div class="dcard-inner">
          <div class="dcard-top">
            <div class="dcard-title">${d.titulo}</div>
            <span class="badge ${d.status}">${statusLabel[d.status]}</span>
          </div>
          ${d.desc ? `<div class="dcard-desc">${d.desc}</div>` : ''}
          <div class="dcard-footer">
            <div class="dcard-tags">
              ${d.cliente ? `<span class="tag">📍 ${d.cliente}</span>` : ''}
              ${d.resp ? `<span class="tag">👤 ${d.resp}</span>` : ''}
              ${d.prazo ? `<span class="tag">📅 ${fmtDate(d.prazo)}${d.hora ? ' ' + d.hora : ''}</span>` : ''}
              ${d.notificar ? `<span class="tag" style="color:${d.notificar==='1h'?'var(--red)':'var(--amber)'}">🔔 ${d.notificar==='1h'?'Crítico 1h':d.notificar}</span>` : ''}
            </div>
            <div class="dcard-actions">
              ${d.status !== 'concluido' ? `<button class="action-btn ok" onclick="concluir(${d.id})">✓</button>` : ''}
              <button class="action-btn" onclick="editDemanda(${d.id})" style="border-color:rgba(77,166,255,0.3);color:var(--blue);background:rgba(77,166,255,0.08);font-size:13px">✏️</button>
              <button class="action-btn del" onclick="delDemanda(${d.id})">✕</button>
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }
  updateStats();
}

function renderAvisos() {
  const el = document.getElementById('avisos-list');
  if (!avisos.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📣</div><div class="empty-text">Nenhum aviso.<br>Toque + para publicar.</div></div>`;
  } else {
    el.innerHTML = avisos.map((a, i) => `
      <div class="acard" style="animation-delay:${i*0.04}s">
        <div class="acard-top">
          <div class="acard-title">${a.titulo}</div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <div class="priority-ring ${a.prioridade}"></div>
            <button class="action-btn" onclick="editAviso(${a.id})" style="width:26px;height:26px;font-size:12px;border-radius:7px;border-color:rgba(77,166,255,0.3);color:var(--blue);background:rgba(77,166,255,0.08)">✏️</button>
            <button class="action-btn del" onclick="deleteAviso(${a.id})" style="width:26px;height:26px;font-size:12px;border-radius:7px">✕</button>
          </div>
        </div>
        ${a.body ? `<div class="acard-body">${a.body}</div>` : ''}
        <div class="acard-footer">
          <span class="acard-autor">✍️ ${a.autor}</span>
          <span class="acard-data">${a.data}</span>
        </div>
      </div>
    `).join('');
  }
}

function updateStats() {
  document.getElementById('c-urgente').textContent = demandas.filter(d => d.status==='urgente').length;
  document.getElementById('c-andamento').textContent = demandas.filter(d => d.status==='andamento').length;
  document.getElementById('c-concluido').textContent = demandas.filter(d => d.status==='pendente').length;
  document.getElementById('tc-demandas').textContent = demandas.length;
  document.getElementById('tc-avisos').textContent = avisos.length;
  document.getElementById('tc-arquivo').textContent = arquivo.length;
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}`;
}

// --- TABS ---
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  const navIdx = { demandas: 0, avisos: 1, arquivo: 2 }[tab] || 0;
  document.querySelectorAll('.nav-btn')[navIdx].classList.add('active');
  if (tab === 'arquivo') renderArquivo();
  document.getElementById('fab-btn').style.display = tab === 'arquivo' ? 'none' : 'flex';
}

// --- SHEET ---
let editingDemandaId = null;
let editingAvisoId = null;

function openSheet() {
  editingDemandaId = null;
  editingAvisoId = null;
  const isAvisos = currentTab === 'avisos';
  document.getElementById('sheet-title').textContent = isAvisos ? 'Novo Aviso' : 'Nova Demanda';
  document.getElementById('form-demanda').style.display = isAvisos ? 'none' : 'block';
  document.getElementById('form-aviso').style.display = isAvisos ? 'block' : 'none';
  // Clear fields
  ['d-titulo','d-desc','d-resp','d-prazo','d-hora'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('d-status').value = 'urgente';
  document.getElementById('d-notificar').value = '';
  ['a-titulo','a-body','a-autor'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('a-prioridade').value = 'alta';
  document.getElementById('btn-save-demanda').textContent = 'Salvar Demanda';
  document.getElementById('btn-save-aviso').textContent = 'Publicar Aviso';
  document.getElementById('sheet-overlay').classList.add('open');
}

function editDemanda(id) {
  const d = demandas.find(x => x.id === id);
  if (!d) return;
  editingDemandaId = id;
  editingAvisoId = null;
  document.getElementById('sheet-title').textContent = 'Editar Demanda';
  document.getElementById('form-demanda').style.display = 'block';
  document.getElementById('form-aviso').style.display = 'none';
  document.getElementById('d-titulo').value = d.titulo || '';
  document.getElementById('d-desc').value = d.desc || '';
  document.getElementById('d-resp').value = d.resp || '';
  document.getElementById('d-status').value = d.status || 'urgente';
  document.getElementById('d-prazo').value = d.prazo || '';
  document.getElementById('d-hora').value = d.hora || '';
  document.getElementById('d-notificar').value = d.notificar || '';
  document.getElementById('btn-save-demanda').textContent = 'Salvar Alterações';
  document.getElementById('sheet-overlay').classList.add('open');
}

function editAviso(id) {
  const a = avisos.find(x => x.id === id);
  if (!a) return;
  editingAvisoId = id;
  editingDemandaId = null;
  document.getElementById('sheet-title').textContent = 'Editar Aviso';
  document.getElementById('form-demanda').style.display = 'none';
  document.getElementById('form-aviso').style.display = 'block';
  document.getElementById('a-titulo').value = a.titulo || '';
  document.getElementById('a-body').value = a.body || '';
  document.getElementById('a-autor').value = a.autor || '';
  document.getElementById('a-prioridade').value = a.prioridade || 'alta';
  document.getElementById('btn-save-aviso').textContent = 'Salvar Alterações';
  document.getElementById('sheet-overlay').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  editingDemandaId = null;
  editingAvisoId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('sheet-overlay')) closeSheet();
}

// --- SAVE ---
function saveDemanda() {
  const titulo = document.getElementById('d-titulo').value.trim();
  const resp = document.getElementById('d-resp').value.trim();
  if (!titulo) { document.getElementById('d-titulo').focus(); return; }
  if (!resp) { document.getElementById('d-resp').focus(); document.getElementById('d-resp').style.borderColor = 'var(--red)'; return; }
  document.getElementById('d-resp').style.borderColor = '';

  const data = {
    titulo,
    desc: document.getElementById('d-desc').value.trim(),
    cliente: '',
    status: document.getElementById('d-status').value,
    resp,
    prazo: document.getElementById('d-prazo').value,
    hora: document.getElementById('d-hora').value,
    notificar: document.getElementById('d-notificar').value,
  };

  if (editingDemandaId) {
    const idx = demandas.findIndex(x => x.id === editingDemandaId);
    if (idx !== -1) demandas[idx] = { ...demandas[idx], ...data };
  } else {
    demandas.unshift({ id: nextDId++, ...data });
    pushNotif('demanda', titulo, currentUser || 'Alguém');
  }

  closeSheet();
  renderDemandas();
  renderRealizados();
}

function saveAviso() {
  const titulo = document.getElementById('a-titulo').value.trim();
  if (!titulo) { document.getElementById('a-titulo').focus(); return; }
  const d = new Date();

  const data = {
    titulo,
    body: document.getElementById('a-body').value.trim(),
    autor: document.getElementById('a-autor').value.trim() || 'Anônimo',
    prioridade: document.getElementById('a-prioridade').value,
    data: `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`,
  };

  if (editingAvisoId) {
    const idx = avisos.findIndex(x => x.id === editingAvisoId);
    if (idx !== -1) avisos[idx] = { ...avisos[idx], ...data };
  } else {
    avisos.unshift({ id: nextAId++, ...data });
    pushNotif('aviso', titulo, data.autor);
  }

  closeSheet();
  renderAvisos();
  updateStats();
}

// --- ACTIONS ---
function concluir(id) {
  const d = demandas.find(x => x.id === id);
  if (d) {
    d.status = 'concluido';
    renderDemandas();
    setTimeout(() => {
      demandas = demandas.filter(x => x.id !== id);
      arquivo.unshift({ ...d, arquivadoEm: new Date().toLocaleDateString('pt-BR') });
      updateStats();
      renderDemandas();
      renderRealizados();
    }, 600);
  }
}

function renderArquivo() {
  const el = document.getElementById('arquivo-list');
  if (!arquivo.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Nenhuma demanda arquivada ainda.</div></div>`;
    return;
  }
  el.innerHTML = arquivo.map((d, i) => `
    <div class="dcard concluido" style="margin-bottom:12px;animation-delay:${i*0.04}s;opacity:0.85">
      <div class="dcard-stripe concluido"></div>
      <div class="dcard-inner">
        <div class="dcard-top">
          <div class="dcard-title">${d.titulo}</div>
          <span class="badge concluido">✓ Concluído</span>
        </div>
        ${d.desc ? `<div class="dcard-desc">${d.desc}</div>` : ''}
        <div class="dcard-footer">
          <div class="dcard-tags">
            ${d.resp ? `<span class="tag">👤 ${d.resp}</span>` : ''}
            ${d.arquivadoEm ? `<span class="tag" style="color:var(--green)">✓ ${d.arquivadoEm}</span>` : ''}
          </div>
          <button class="action-btn del" onclick="delArquivo(${d.id})">✕</button>
        </div>
      </div>
    </div>
  `).join('');
}

function delArquivo(id) {
  arquivo = arquivo.filter(x => x.id !== id);
  renderRealizados();
  updateStats();
  renderArquivo();
}

function delDemanda(id) {
  demandas = demandas.filter(x => x.id !== id);
  renderDemandas();
  renderRealizados();
}

function deleteAviso(id) {
  avisos = avisos.filter(x => x.id !== id);
  renderAvisos();
  updateStats();
}

// --- REALIZADOS ---
let realizados = 0;
const MAX_PESSOAS = 11;

function renderRealizados() {
  const dots = document.getElementById('realizados-dots');
  const concluidos = Math.min(arquivo.length, MAX_PESSOAS);

  document.getElementById('realizados-count').textContent = concluidos;

  dots.innerHTML = Array.from({length: MAX_PESSOAS}, (_, i) => {
    const done = i < concluidos;
    return `<div style="
      flex:1;height:10px;border-radius:4px;
      background:${done ? 'var(--green)' : 'var(--red)'};
      border:none;
      transition:background 0.4s;
      box-shadow:${done ? '0 0 6px rgba(0,210,106,0.4)' : '0 0 4px rgba(255,59,71,0.3)'};
    "></div>`;
  }).join('');
}

// --- INIT ---
renderDemandas();
renderAvisos();
renderRealizados();
updateStats();
</script>
</body>
</html>
